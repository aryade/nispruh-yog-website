      - region "What the practice opens within you" [ref=e57]:
        - generic [ref=e58]:
          - generic [ref=e59]:
            - paragraph [ref=e60]: Benefits of Meditation
            - heading "What the practice opens within you" [level=2] [ref=e61]:
              - text: What the practice
              - text: opens within you
            - paragraph [ref=e62]: Meditation is not about becoming a different person than the living world or becoming a new person. It is about training yourself in full awareness and getting a healthy sense of perspective. Meditation teaches you to systematically explore your inner dimensions. It is a system of commitment, not a commandment.
          - list [ref=e63]:
            - listitem [ref=e64]:
              - img [ref=e66]
              - generic [ref=e71]:
                - heading "Inner Peace" [level=3] [ref=e72]
                - paragraph [ref=e73]: Regular practice settles the nervous system, creating a baseline of calm that persists through daily life — not just on the cushion.
            - listitem [ref=e74]:
              - img [ref=e76]
              - generic [ref=e79]:
                - heading "Mental Clarity" [level=3] [ref=e80]
                - paragraph [ref=e81]: Pranayama and focused awareness clear the mental fog that accumulates from constant stimulation, restoring a quiet, perceptive mind.
            - listitem [ref=e82]:
              - img [ref=e84]
              - generic [ref=e86]:
                - heading "Emotional Balance" [level=3] [ref=e87]
                - paragraph [ref=e88]: As breath and awareness deepen, reactive patterns soften. You begin to meet experience with steadiness rather than being swept by it.
            - listitem [ref=e89]:
              - img [ref=e91]
              - generic [ref=e94]:
                - heading "Better Focus" [level=3] [ref=e95]
                - paragraph [ref=e96]: Single-pointed concentration — practised inwardly — naturally carries into work, relationships, and creative life with greater depth.
            - listitem [ref=e97]:
              - img [ref=e99]
              - generic [ref=e102]:
                - heading "Stress Reduction" [level=3] [ref=e103]
                - paragraph [ref=e104]: The slow, conscious breath of Kriya activates the parasympathetic system — the body's innate rest response — releasing held tension at its root.
            - listitem [ref=e105]:
              - img [ref=e107]
              - generic [ref=e110]:
                - heading "Self-Awareness" [level=3] [ref=e111]
                - paragraph [ref=e112]: Witnessing the mind without judgment is the first step of wisdom. Kriya creates the inner space where honest self-knowing becomes possible.
          - blockquote [ref=e113]:
            - paragraph [ref=e114]: "\"These are not promises — they are natural unfoldings that arise when we stop resisting our own stillness.\""
