      - region "What is Kriya Yoga?" [ref=e37]:
        - generic [ref=e39]:
          - generic [ref=e40]:
            - paragraph [ref=e41]: The practice
            - heading "What is Kriya Yoga?" [level=2] [ref=e42]
            - paragraph [ref=e43]: Yog of Awareness. Krishna explains Kriya Yog as the practice of purifying the physiological as well as mental and spiritual systems. It is an ancient meditation technique that is a part of the spiritual path.
            - paragraph [ref=e44]: An effective scientific meditation technique or sadhana which works on all the seven chakras and helps purify oneself and reach a higher level of consciousness. This technique is much more direct and works directly on chakras with the source of spiritual energy deep in our spines. It helps the practitioner to control the life force by mentally drawing it up and down the spine, with awareness and will.
            - paragraph [ref=e45]: Kriya Yoga is a living meditation tradition woven by breath, attention, and simple devotion. It is not a product, but an invitation into yourself. Repeat quiet practice and hold awareness with tenderness. Allow small shifts to settle into your daily rhythm.
            - link "Learn more about the lineage" [ref=e47] [cursor=pointer]:
              - /url: /about-kriya-yoga
              - text: Learn more about the lineage
              - img [ref=e48]
