            - heading "Swami Nispruh" [level=2] [ref=e205]
            - paragraph [ref=e206]: Kriya Yoga Acharya · Lineage of Mahavatar Babaji
            - paragraph [ref=e207]: Swami Nispruh Spandan has walked the path of Kriya Yoga for over two decades, receiving initiation and guidance from teachers in the direct lineage of Mahavatar Babaji. His teaching is quiet, unhurried, and grounded in lived experience rather than doctrine.
            - paragraph [ref=e208]: After years of solitary practice in the foothills of the Himalayas, he was called to teach — not to build an institution, but to offer a hand to those genuinely seeking their own inner stillness. His approach honours the sacred nature of the transmission while remaining accessible to modern practitioners.
            - paragraph [ref=e209]: He teaches in small groups and one-to-one settings, believing that real practice cannot be mass-produced. Every student is met where they are.
