        - region "About Kriya Yoga" [ref=e464]:
          - generic [ref=e466]:
            - paragraph [ref=e467]: The science of inner awakening
            - heading "About Kriya Yoga" [level=1] [ref=e468]:
              - text: About
              - text: Kriya Yoga
            - paragraph [ref=e469]: An ancient meditative science transmitted through an unbroken lineage of masters. Not a belief system — an experiential path of breath, awareness, and self-inquiry that reveals the stillness already present within you.
        - region "What is Kriya Yoga?" [ref=e470]:
          - generic [ref=e472]:
            - generic [ref=e473]:
              - paragraph [ref=e474]: The foundation
              - heading "What is Kriya Yoga?" [level=2] [ref=e475]
              - paragraph [ref=e476]: The word Kriya means “action with awareness.” Kriya Yoga is a precise set of inner techniques — primarily breath-based — that work directly with the spine and the life-force to still the mind and awaken self-awareness.
              - paragraph [ref=e477]: Unlike philosophy or belief, Kriya is entirely practical. It asks no faith in doctrine, only a willingness to sit quietly, breathe consciously, and observe honestly. The transformation that follows is the natural consequence of the practice itself.
              - paragraph [ref=e478]: Carried through the lineage of Mahavatar Babaji, Lahiri Mahasaya, Sri Yukteswar Giri, and Paramahansa Yogananda, these teachings have guided sincere seekers for centuries. They remain as alive today as they were in the Himalayan solitude where they were first transmitted.
            - img "Kriya Yoga meditation — image coming soon" [ref=e480]:
              - generic [ref=e481]: ꩜
              - paragraph [ref=e482]: Image placeholder
        - region "How Kriya Yoga actually works" [ref=e483]:
          - generic [ref=e484]:
            - generic [ref=e485]:
              - paragraph [ref=e486]: The mechanism
              - heading "How Kriya Yoga actually works" [level=2] [ref=e487]:
                - text: How Kriya Yoga
                - text: actually works
            - list [ref=e488]:
              - listitem [ref=e489]:
                - generic [ref=e490]: "01"
                - generic [ref=e491]:
                  - heading "Breath as the vehicle" [level=3] [ref=e492]
                  - paragraph [ref=e493]: Kriya Yoga begins with pranayama — conscious, rhythmic breathing that links the mind to the subtle currents of life-force (prana) running through the spine. The breath is not a metaphor; it is the actual mechanism.
              - listitem [ref=e494]:
                - generic [ref=e495]: "02"
                - generic [ref=e496]:
                  - heading "Awareness without force" [level=3] [ref=e497]
                  - paragraph [ref=e498]: The practice asks you to observe — not to control, suppress, or achieve. As you hold steady attention on the breath and the spine, the mind begins to settle of its own accord, like sediment sinking in still water.
              - listitem [ref=e499]:
                - generic [ref=e500]: "03"
                - generic [ref=e501]:
                  - heading "Repetition builds depth" [level=3] [ref=e502]
                  - paragraph [ref=e503]: A single session offers rest. A month of daily practice opens subtlety. A year changes the texture of ordinary experience. Kriya Yoga is cumulative — each sitting adds to what came before.
              - listitem [ref=e504]:
                - generic [ref=e505]: "04"
                - generic [ref=e506]:
                  - heading "Transmission through lineage" [level=3] [ref=e507]
                  - paragraph [ref=e508]: The full techniques are traditionally received from a qualified teacher in an unbroken lineage. This is not gatekeeping — it is recognition that certain inner processes are most safely guided by one who has walked them.
        - region "What opens through practice" [ref=e509]:
          - generic [ref=e510]:
            - generic [ref=e511]:
              - paragraph [ref=e512]: Natural unfoldings
              - heading "What opens through practice" [level=2] [ref=e513]:
                - text: What opens
