            - list [ref=e514]:
              - listitem [ref=e515]:
                - heading "Inner peace" [level=3] [ref=e517]
                - paragraph [ref=e518]: A baseline of calm that persists beyond the cushion.
              - listitem [ref=e519]:
                - heading "Mental clarity" [level=3] [ref=e521]
                - paragraph [ref=e522]: Pranayama clears the fog that accumulates from constant stimulation.
              - listitem [ref=e523]:
                - heading "Emotional balance" [level=3] [ref=e525]
                - paragraph [ref=e526]: Reactive patterns soften; equanimity naturally deepens.
              - listitem [ref=e527]:
                - heading "Better focus" [level=3] [ref=e529]
                - paragraph [ref=e530]: Single-pointed inner concentration carries into daily life.
              - listitem [ref=e531]:
                - heading "Stress reduction" [level=3] [ref=e533]
                - paragraph [ref=e534]: The slow breath activates the body's parasympathetic response.
              - listitem [ref=e535]:
                - heading "Self-awareness" [level=3] [ref=e537]
                - paragraph [ref=e538]: Witnessing the mind without judgment — the first step of wisdom.
            - blockquote [ref=e539]:
