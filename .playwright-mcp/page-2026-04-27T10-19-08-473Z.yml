        - region "Guru Parampara An unbroken chain" [ref=e542]:
          - generic [ref=e543]:
            - generic [ref=e544]:
              - paragraph [ref=e545]: The lineage
              - heading "Guru Parampara An unbroken chain" [level=2] [ref=e546]:
                - text: Guru Parampara
                - text: An unbroken chain
              - paragraph [ref=e547]: The teachings of Kriya Yoga have been transmitted through an unbroken lineage of enlightened masters. Each master received the sacred techniques and passed them forward to sincere seekers, preserving the authenticity and power of this ancient science.
            - generic [ref=e548]:
              - generic [ref=e549]:
                - heading "Krishna Parampara" [level=3] [ref=e550]
                - generic [ref=e551]:
                  - generic [ref=e552]:
                    - heading "Krishna Parampara" [level=4] [ref=e553]
                    - paragraph [ref=e554]: Lord Krishna is the incarnation of Lord Vishnu and the central character in the Mahabharata. His teachings are codified in 700 verses as the Bhagavad Gita. Lord Krishna taught the science of Kriyayog to Arjuna thousands of years ago. The page includes a Sanskrit shloka from the Bhagavad Gita (Yada yada hi dharmasya…).
                  - generic [ref=e555]:
                    - heading "Krishna – Kriyayog" [level=4] [ref=e556]
                    - paragraph [ref=e557]: Krishna explains Kriyayog as the practice of purifying the physiological, mental, and spiritual systems — a Yog of Awareness. "Kri" means karma or action and "ya" means soul — the action of the soul. A kriya is the action done for the soul, or which frees us from the bondage of karma by burning physical and mental impurities. Kriyayog includes Asanas, Pranayama, and spirituality, but focuses more on mental and spiritual benefits. Through the breathing technique of inhaling and exhaling, a yogi balances breath and releases Prana to bring bodily systems into synchrony.
              - generic [ref=e558]:
                - heading "Mahavatar Babaji" [level=3] [ref=e559]
                - paragraph [ref=e562]: Mahavatar Babaji is the supreme Guru for all Yogis, believed to have been living in the Himalayas for hundreds of years. He is said to have been born on November 30, 203 AD in a coastal village in Tamil Nadu. Babaji revived the technique of Kriyayog for the betterment of humankind and passed it to Lahiri Mahasaya. He reportedly said that the Kriyayog he was transmitting in the 19th century was the same science Krishna gave to Arjuna millennia ago, and which was later known to Patanjali and other disciples.
              - generic [ref=e563]:
                - heading "Shamacharan Lahiri (Lahiri Mahasaya)" [level=3] [ref=e564]
                - paragraph [ref=e567]: Shyama Charan Lahiri was a householder working in British Railways in Bengal. While on official duty in Ranikhet near the Himalayas, he heard a young man calling his name — who turned out to be Mahavatar Babaji. Babaji's gentle touch on his forehead awakened memories of previous incarnations. Babaji then initiated him into the sacred science of Kriyayog and later gave him permission to teach and initiate others. Lahiri Mahasaya entered Maha Samadhi in Banaras on September 26, 1985.
              - generic [ref=e568]:
                - heading "Sri Yukteswara Giri" [level=3] [ref=e569]
                - paragraph [ref=e572]: "Born on May 10, 1855, in Serampore, West Bengal (birth name: Priyanath Karar), Sri Yukteswara Giri was initiated into Kriyayog by Lahiri Mahasaya. He met Mahavatar Babaji at the Kumbha Mela in Allahabad in 1894, and at Babaji's request wrote a book called Kaivalya Darsanam. His most famous disciple was Paramahansa Yogananda, who later carried Kriyayog to the West. He attained Mahasamadhi on March 9, 1935."
              - generic [ref=e573]:
                - heading "Sathyananda Giri" [level=3] [ref=e574]
                - paragraph [ref=e577]: Born on November 17, 1896, in Bengal, Sathyananda Giri was trained by Swami Sri Yukteswar Giri at his Puri Karar Ashram in 1919 and was also a disciple of Paramahansa Yogananda. He lived in hermitages at Puri and Ranchi and had thousands of devotees. He attained Nirvana on August 2, 1971, at the age of 74.
              - generic [ref=e578]:
                - heading "Pahadi Baba (Shree Hariharanandji)" [level=3] [ref=e579]
                - paragraph [ref=e582]: Shree Hariharanandji was a Tantra Samrat and Kriyayogi who lived in a cave on the hills ("Pahadi" in Hindi), and so was called "Pahadi Baba." He was an enlightened yogi (Sidhha Purush) knowledgeable in many sadhanas. Madan Mohanji Sahay met him while passing by those hills, kept visiting, and was later initiated by Pahadi Baba into Kriyayog.
              - generic [ref=e583]:
                - heading "Madan Mohanji Sahay" [level=3] [ref=e584]
                - paragraph [ref=e587]: Shree Madan Mohanji Sahay was a family man who retired as a Divisional Manager from LIC in 1989. After meeting Pahadi Baba, his life turned toward spirituality. Pahadi Baba tested and transformed him through various trials, turning his materialistic habits into spiritual ones. He later became the Guru of Swami Nispruh Spandan and gave Swamiji his current name — Paramhansa Swami Nispruh Spandan.
              - generic [ref=e588]:
                - heading "Tauji – Banarasilal Saraf" [level=3] [ref=e589]
                - paragraph [ref=e592]: Sri Banarasilal Saraf was a disciple of Madan Mohanji Sahay. Swamiji met him at Guruji's Ashram and called him "Tauji" affectionately. Tauji loved the young and devoted Swamiji and passed on his spiritual knowledge and blessings to him.
              - generic [ref=e593]:
                - heading "Shree Aghorinath-Shobharam (Hariom Wale Babaji)" [level=3] [ref=e594]
                - paragraph [ref=e597]: Shree Aghorinath-Shobharam was a government servant and family man, blessed with many Siddhis by his Guru. He was the father and first Guru of Swami Nispruh Spandan, training him with strict rules and discipline. Enlightened yogis and saints frequently visited their home for Satsang. At a young age, Nispruh Spandan left home to find a Guru, stayed at many holy places including the Himalayas and Puri, and eventually found Madan Mohanji Sahay.
              - generic [ref=e598]:
                - heading "Paramahansa Yogananda – Autobiography of a Yogi" [level=3] [ref=e599]
                - paragraph [ref=e602]: As guided by Babaji, Sri Yukteswara Giri met a boy named Mukunda at the Kumbha Mela in Allahabad in 1894, who later became the renowned Paramahansa Yogananda. Born January 5, 1893, in Gorakhpur, India, Yogananda taught meditation and Kriyayog to millions in India and the USA. His book Autobiography of a Yogi sold over four million copies and was listed by HarperSan Francisco as one of the "100 best spiritual books of the 20th Century." He attained Nirvana on March 7, 1952.
